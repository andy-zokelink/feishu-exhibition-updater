name: 飞书展会自动更新

# 定时触发：每周日早上8点执行（北京时间）
on:
  schedule:
    - cron: '0 0 * * 0'  # UTC时间0点，对应北京时间早上8点
  workflow_dispatch:     # 支持手动触发
  
# 允许手动运行
permissions:
  contents: write

jobs:
  update-exhibition:
    runs-on: ubuntu-latest
    
    steps:
    # 检出代码
    - name: 检出仓库
      uses: actions/checkout@v3
      with:
        persist-credentials: false
        
    # 设置Python环境
    - name: 设置Python环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
        
    # 安装依赖
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    # 从GitHub Secrets获取敏感信息
    - name: 创建配置文件
      env:
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
        FEISHU_BASE_URL: ${{ secrets.FEISHU_BASE_URL }}
      run: |
        # 创建Python配置文件
        cat > config.py << 'EOF'
        # GitHub Actions自动生成的配置文件
        FEISHU_APP_ID = "${FEISHU_APP_ID}"
        FEISHU_APP_SECRET = "${FEISHU_APP_SECRET}"
        FEISHU_TABLE_ID = "${FEISHU_TABLE_ID}"
        FEISHU_BASE_URL = "${FEISHU_BASE_URL}"
        EOF
        echo "配置文件创建完成"
        
    # 修改脚本使其支持环境变量
    - name: 准备更新脚本
      run: |
        # 创建适用于GitHub Actions的脚本版本
        cat > github_actions_update.py << 'EOF'
        #!/usr/bin/env python3
        # -*- coding: utf-8 -*-
        """
        飞书多维表格展会自动更新脚本（GitHub Actions版本）
        功能：定期抓取深圳会展中心官网展会信息，自动同步到飞书多维表格
        增强：自动去重功能，避免重复数据
        """

        import requests
        import json
        from datetime import datetime
        import time
        import re
        from typing import List, Dict
        from collections import defaultdict
        import os

        # 从配置文件读取配置
        try:
            from config import FEISHU_APP_ID, FEISHU_APP_SECRET, FEISHU_TABLE_ID, FEISHU_BASE_URL
        except ImportError:
            # 如果配置文件不存在，从环境变量读取
            FEISHU_APP_ID = os.getenv("FEISHU_APP_ID")
            FEISHU_APP_SECRET = os.getenv("FEISHU_APP_SECRET")
            FEISHU_TABLE_ID = os.getenv("FEISHU_TABLE_ID")
            FEISHU_BASE_URL = os.getenv("FEISHU_BASE_URL")
        
        # 验证配置
        if not all([FEISHU_APP_ID, FEISHU_APP_SECRET, FEISHU_TABLE_ID, FEISHU_BASE_URL]):
            raise Exception("缺少必要的配置参数，请检查GitHub Secrets设置")

        # ==================== 飞书API操作 ====================

        class FeishuAPI:
            """飞书API操作类"""
            
            def __init__(self, app_id: str, app_secret: str):
                self.app_id = app_id
                self.app_secret = app_secret
                self.access_token = None
                self.app_token = None
            
            def get_tenant_access_token(self) -> str:
                """获取应用访问令牌"""
                url = "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal"
                payload = {
                    "app_id": self.app_id,
                    "app_secret": self.app_secret
                }
                
                try:
                    response = requests.post(url, json=payload, timeout=30)
                    data = response.json()
                    
                    if data.get("code") == 0:
                        self.access_token = data.get("tenant_access_token")
                        print(f"[{datetime.now()}] 成功获取飞书访问令牌")
                        return self.access_token
                    else:
                        raise Exception(f"获取令牌失败: {data.get('msg')}")
                except Exception as e:
                    raise Exception(f"请求飞书API失败: {str(e)}")
            
            def discover_app_token(self, url: str) -> str:
                """自动发现app_token"""
                print(f"[{datetime.now()}] 正在自动发现app_token...")
                
                # 尝试从链接提取
                patterns = [
                    r'/base/([a-zA-Z0-9_-]+)',
                    r'app_id[=]([a-zA-Z0-9_-]+)',
                    r'/wiki/([a-zA-Z0-9_-]+)'
                ]
                
                for pattern in patterns:
                    match = re.search(pattern, url)
                    if match:
                        candidate = match.group(1)
                        print(f"[{datetime.now()}] 尝试候选app_token: {candidate}")
                        
                        # 验证这个app_token是否有效
                        if self._validate_app_token(candidate):
                            self.app_token = candidate
                            print(f"[{datetime.now()}] ✅ 成功找到有效的app_token")
                            return candidate
                
                # 尝试常见的app_token格式
                common_candidates = [
                    "JGZYwt1Bqiyo3CkalWac9VY2nSc",  # wiki ID
                    "zcnytfl3vf1r",  # 可能的组织ID
                ]
                
                for candidate in common_candidates:
                    print(f"[{datetime.now()}] 尝试常见候选: {candidate}")
                    if self._validate_app_token(candidate):
                        self.app_token = candidate
                        print(f"[{datetime.now()}] ✅ 成功找到有效的app_token")
                        return candidate
                
                raise Exception("无法自动发现有效的app_token")
            
            def _validate_app_token(self, app_token: str) -> bool:
                """验证app_token是否有效"""
                if not self.access_token:
                    self.get_tenant_access_token()
                
                try:
                    url = f"https://open.feishu.cn/open-apis/bitable/v1/apps/{app_token}/tables"
                    headers = {
                        "Authorization": f"Bearer {self.access_token}",
                        "Content-Type": "application/json"
                    }
                    
                    response = requests.get(url, headers=headers, timeout=30)
                    data = response.json()
                    
                    if data.get("code") == 0:
                        tables = data.get("data", {}).get("items", [])
                        print(f"[{datetime.now()}] 找到 {len(tables)} 个表格")
                        
                        # 检查是否包含目标表格
                        for table in tables:
                            if table.get("table_id") == FEISHU_TABLE_ID:
                                print(f"[{datetime.now()}] ✅ 找到目标表格: {table.get('name', '')}")
                                return True
                        
                        return False
                    else:
                        # 如果是权限错误，说明app_token有效但没有权限
                        if data.get("code") == 115001 or data.get("code") == 99991663:
                            print(f"[{datetime.now()}] app_token有效但无权限访问")
                            return False
                        
                        return False
                        
                except Exception as e:
                    print(f"[{datetime.now()}] 验证失败: {str(e)}")
                    return False
            
            def get_table_records(self) -> List[Dict]:
                """获取表格中所有记录"""
                if not self.access_token:
                    self.get_tenant_access_token()
                
                url = f"https://open.feishu.cn/open-apis/bitable/v1/apps/{self.app_token}/tables/{FEISHU_TABLE_ID}/records"
                headers = {
                    "Authorization": f"Bearer {self.access_token}",
                    "Content-Type": "application/json"
                }
                
                all_records = []
                page_token = ""
                
                while True:
                    params = {"page_size": 100}
                    if page_token:
                        params["page_token"] = page_token
                    
                    try:
                        response = requests.get(url, headers=headers, params=params, timeout=30)
                        data = response.json()
                        
                        if data.get("code") == 0:
                            records = data.get("data", {}).get("items", [])
                            all_records.extend(records)
                            
                            page_token = data.get("data", {}).get("page_token", "")
                            if not page_token or data.get("data", {}).get("has_more", False) == False:
                                break
                        else:
                            raise Exception(f"获取记录失败: {data.get('msg')}")
                    except Exception as e:
                        raise Exception(f"请求表格数据失败: {str(e)}")
                
                print(f"[{datetime.now()}] 成功获取 {len(all_records)} 条现有记录")
                return all_records
            
            def deduplicate_records(self) -> Dict:
                """去重：删除表格中的重复记录"""
                print(f"[{datetime.now()}] 开始去重检查...")
                
                # 获取所有记录
                all_records = self.get_table_records()
                
                # 按序号分组
                seq_groups = defaultdict(list)
                for record in all_records:
                    record_data = record.get("fields", {})
                    seq_num = record_data.get("序号", "")
                    if seq_num:
                        seq_groups[seq_num].append(record)
                
                # 找出重复记录
                to_delete = []
                duplicate_count = 0
                for seq, records in seq_groups.items():
                    if len(records) > 1:
                        duplicate_count += 1
                        # 保留第一条，删除其余的
                        for record in records[1:]:
                            to_delete.append(record.get("record_id"))
                
                print(f"[{datetime.now()}] 发现 {duplicate_count} 个重复的序号，需要删除 {len(to_delete)} 条记录")
                
                # 删除重复记录
                deleted_count = 0
                if to_delete:
                    headers = {
                        "Authorization": f"Bearer {self.access_token}",
                        "Content-Type": "application/json"
                    }
                    
                    for record_id in to_delete:
                        delete_url = f"https://open.feishu.cn/open-apis/bitable/v1/apps/{self.app_token}/tables/{FEISHU_TABLE_ID}/records/{record_id}"
                        delete_response = requests.delete(delete_url, headers=headers, timeout=30)
                        delete_data = delete_response.json()
                        
                        if delete_data.get("code") == 0:
                            deleted_count += 1
                            if deleted_count % 10 == 0:
                                print(f"[{datetime.now()}] 已删除 {deleted_count}/{len(to_delete)} 条重复记录")
                
                result = {
                    "total_duplicates": duplicate_count,
                    "records_deleted": deleted_count,
                    "remaining_records": len(all_records) - deleted_count
                }
                
                print(f"[{datetime.now()}] 去重完成！删除 {deleted_count} 条重复记录，剩余 {result['remaining_records']} 条唯一记录")
                return result
            
            def fill_empty_update_time(self) -> Dict:
                """补齐更新时间为空的记录"""
                print(f"[{datetime.now()}] 检查更新时间字段...")
                
                # 获取所有记录
                all_records = self.get_table_records()
                
                # 找出更新时间为空的记录
                empty_records = []
                for record in all_records:
                    record_data = record.get("fields", {})
                    update_time = record_data.get("更新时间", "").strip()
                    
                    if not update_time or update_time == "":
                        empty_records.append(record)
                
                print(f"[{datetime.now()}] 发现 {len(empty_records)} 条更新时间为空的记录")
                
                # 补齐更新时间
                filled_count = 0
                if empty_records:
                    current_time = datetime.now().strftime("%Y-%m-%d %H:%M:%S")
                    headers = {
                        "Authorization": f"Bearer {self.access_token}",
                        "Content-Type": "application/json"
                    }
                    
                    for record in empty_records:
                        record_id = record.get("record_id")
                        
                        # 构建更新数据
                        update_payload = {
                            "fields": {
                                "更新时间": current_time
                            }
                        }
                        
                        update_url = f"https://open.feishu.cn/open-apis/bitable/v1/apps/{self.app_token}/tables/{FEISHU_TABLE_ID}/records/{record_id}"
                        update_response = requests.put(update_url, headers=headers, json=update_payload, timeout=30)
                        update_data = update_response.json()
                        
                        if update_data.get("code") == 0:
                            filled_count += 1
                            if filled_count % 10 == 0:
                                print(f"[{datetime.now()}] 已补齐 {filled_count}/{len(empty_records)} 条记录的更新时间")
                
                result = {
                    "total_empty": len(empty_records),
                    "records_filled": filled_count
                }
                
                if filled_count > 0:
                    print(f"[{datetime.now()}] 补齐完成！已为 {filled_count} 条记录填写更新时间")
                else:
                    print(f"[{datetime.now()}] 所有记录的更新时间都已填写完整")
                
                return result
            
            def batch_add_records(self, records: List[Dict]) -> Dict:
                """批量添加记录"""
                if not self.access_token:
                    self.get_tenant_access_token()
                
                url = f"https://open.feishu.cn/open-apis/bitable/v1/apps/{self.app_token}/tables/{FEISHU_TABLE_ID}/records/batch_create"
                headers = {
                    "Authorization": f"Bearer {self.access_token}",
                    "Content-Type": "application/json"
                }
                
                batch_size = 500
                results = {"success": 0, "failed": 0, "errors": []}
                
                for i in range(0, len(records), batch_size):
                    batch = records[i:i + batch_size]
                    payload = {"records": batch}
                    
                    try:
                        response = requests.post(url, headers=headers, json=payload, timeout=30)
                        data = response.json()
                        
                        if data.get("code") == 0:
                            results["success"] += len(batch)
                            print(f"[{datetime.now()}] 批量添加 {len(batch)} 条记录成功")
                        else:
                            results["failed"] += len(batch)
                            results["errors"].append(data.get('msg'))
                            raise Exception(f"批量添加失败: {data.get('msg')}")
                    except Exception as e:
                        results["failed"] += len(batch)
                        results["errors"].append(str(e))
                        print(f"[{datetime.now()}] 批量添加失败: {str(e)}")
                
                return results

        # ==================== 展会数据获取 ====================

        class ExhibitionScraper:
            """展会数据抓取类"""
            
            def __init__(self):
                pass
            
            def fetch_exhibition_data(self) -> List[Dict]:
                """抓取展会数据"""
                try:
                    print(f"[{datetime.now()}] 开始抓取展会数据...")
                    
                    # 使用本地展会数据文件
                    try:
                        with open("深圳会展中心2026年展会排期表_完整版.md", "r", encoding="utf-8") as f:
                            content = f.read()
                            print(f"[{datetime.now()}] 使用本地展会数据文件")
                            return self._parse_markdown_table(content)
                    except FileNotFoundError:
                        print(f"[{datetime.now()}] 未找到本地数据文件，返回空列表")
                        return []
                        
                except Exception as e:
                    print(f"[{datetime.now()}] 抓取展会数据失败: {str(e)}")
                    return []
            
            def _parse_markdown_table(self, content: str) -> List[Dict]:
                """解析Markdown表格内容"""
                exhibitions = []
                
                lines = content.split('\n')
                current_exhibition = {}
                
                for line in lines:
                    line = line.strip()
                    
                    # 查找表格行
                    if '|' in line:
                        parts = [p.strip() for p in line.split('|')]
                        
                        # 跳过表头和分隔行
                        if len(parts) < 2 or '序号' in parts[1] or '---' in parts[1]:
                            continue
                        
                        # 检查是否是数据行
                        try:
                            seq_num = parts[1]
                            if seq_num and seq_num.isdigit():
                                # 保存上一个展会
                                if current_exhibition:
                                    exhibitions.append(current_exhibition)
                                
                                # 开始新展会
                                current_exhibition = {
                                    "序号": int(seq_num),
                                    "展会名称": parts[2] if len(parts) > 2 else "",
                                    "展览时间": parts[3] if len(parts) > 3 else "",
                                    "展会地点": parts[4] if len(parts) > 4 else "深圳会展中心",
                                    "展会简介": parts[5] if len(parts) > 5 else "",
                                    "推荐理由": parts[6] if len(parts) > 6 else "",
                                    "推荐星级": parts[7] if len(parts) > 7 else "",
                                    "联系方式": parts[8] if len(parts) > 8 else ""
                                }
                        except (ValueError, IndexError):
                            continue
                
                # 添加最后一个展会
                if current_exhibition:
                    exhibitions.append(current_exhibition)
                
                print(f"[{datetime.now()}] 解析完成，共 {len(exhibitions)} 个展会")
                return exhibitions

        # ==================== 数据处理和对比 ====================

        class DataProcessor:
            """数据处理和对比类"""
            
            def __init__(self, feishu_api: FeishuAPI):
                self.feishu_api = feishu_api
            
            def compare_and_update(self, new_exhibitions: List[Dict]) -> Dict:
                """对比数据并更新"""
                print(f"[{datetime.now()}] 开始数据对比...")
                
                # 获取现有记录
                existing_records = self.feishu_api.get_table_records()
                
                # 构建现有展会的唯一标识集合
                existing_set = set()
                
                for record in existing_records:
                    record_data = record.get("fields", {})
                    seq_num = record_data.get("序号", "")
                    
                    # 使用序号作为唯一标识
                    if seq_num:
                        existing_set.add(seq_num)
                
                # 筛选出新的展会
                new_records = []
                for exhibition in new_exhibitions:
                    seq_num = str(exhibition.get("序号", ""))
                    
                    if seq_num not in existing_set:
                        new_records.append(exhibition)
                        print(f"[{datetime.now()}] 发现新展会序号: {seq_num}")
                
                print(f"[{datetime.now()}] 对比完成，发现 {len(new_records)} 条新记录")
                
                return {
                    "total_new": len(new_records),
                    "new_records": new_records,
                    "total_existing": len(existing_set)
                }
            
            def format_for_feishu(self, exhibition: Dict) -> Dict:
                """将展会数据格式化为飞书API所需的格式"""
                # 从现有数据中补充信息
                location = exhibition.get("展会地点", "深圳会展中心")
                contact = exhibition.get("联系方式", "")
                
                # 获取当前时间作为更新时间
                update_time = datetime.now().strftime("%Y-%m-%d %H:%M:%S")
                
                # 确保所有字段都是字符串类型（飞书文本字段要求）
                fields = {
                    "序号": str(exhibition.get("序号", "")),
                    "展会名称": str(exhibition.get("展会名称", "")),
                    "展会时间": str(exhibition.get("展览时间", "")),
                    "展会地点": str(location),
                    "展会简介": str(exhibition.get("展会简介", "")),
                    "推荐理由": str(exhibition.get("推荐理由", "")),
                    "推荐星级": str(exhibition.get("推荐星级", "")),
                    "联系方式": str(contact),
                    "更新时间": str(update_time)
                }
                
                return {"fields": fields}

        # ==================== 主程序 ====================

        def main():
            """主程序"""
            print("=" * 60)
            print("飞书多维表格展会自动更新脚本（GitHub Actions版本）")
            print(f"开始时间: {datetime.now()}")
            print("=" * 60)
            
            try:
                # 1. 初始化飞书API
                print(f"[{datetime.now()}] 初始化飞书API...")
                feishu_api = FeishuAPI(FEISHU_APP_ID, FEISHU_APP_SECRET)
                feishu_api.get_tenant_access_token()
                app_token = feishu_api.discover_app_token(FEISHU_BASE_URL)
                
                # 2. 去重检查
                print(f"[{datetime.now()}] 执行去重检查...")
                deduplicate_result = feishu_api.deduplicate_records()
                
                # 2.5 补齐更新时间为空的记录
                print(f"[{datetime.now()}] 检查更新时间字段...")
                fill_result = feishu_api.fill_empty_update_time()
                
                # 3. 抓取展会数据
                print(f"[{datetime.now()}] 抓取深圳会展中心展会数据...")
                scraper = ExhibitionScraper()
                new_exhibitions = scraper.fetch_exhibition_data()
                
                if not new_exhibitions:
                    print(f"[{datetime.now()}] 未获取到展会数据，任务结束")
                    return True
                
                # 4. 数据处理和对比
                print(f"[{datetime.now()}] 处理和对比数据...")
                processor = DataProcessor(feishu_api)
                compare_result = processor.compare_and_update(new_exhibitions)
                
                if compare_result["total_new"] == 0:
                    print(f"[{datetime.now()}] 没有新增展会，无需更新")
                    return True
                
                # 5. 格式化数据
                print(f"[{datetime.now()}] 格式化 {compare_result['total_new']} 条新记录...")
                formatted_records = []
                for exhibition in compare_result["new_records"]:
                    formatted_record = processor.format_for_feishu(exhibition)
                    formatted_records.append(formatted_record)
                
                # 6. 更新飞书表格
                print(f"[{datetime.now()}] 更新飞书多维表格...")
                update_result = feishu_api.batch_add_records(formatted_records)
                
                # 7. 记录结果
                print(f"[{datetime.now()}] 更新完成！成功: {update_result['success']} 条，失败: {update_result['failed']} 条")
                if update_result["errors"]:
                    print(f"[{datetime.now()}] 错误详情: {update_result['errors']}")
                
                print(f"[{datetime.now()}] === 自动更新任务完成 ===")
                return True
                
            except Exception as e:
                print(f"[{datetime.now()}] 任务执行失败: {str(e)}")
                print(f"错误详情: {str(e)}")
                return False
            
            finally:
                print("=" * 60)
                print(f"结束时间: {datetime.now()}")
                print("=" * 60)

        if __name__ == "__main__":
            success = main()
            exit(0 if success else 1)
        EOF
        
        echo "GitHub Actions脚本创建完成"
        
    # 运行更新脚本
    - name: 运行飞书更新脚本
      env:
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
        FEISHU_BASE_URL: ${{ secrets.FEISHU_BASE_URL }}
      run: |
        python github_actions_update.py
        
    # 保存执行日志
    - name: 保存执行日志
      if: always()
      run: |
        mkdir -p logs
        echo "执行时间: $(date '+%Y-%m-%d %H:%M:%S')" > logs/latest_run.log
        echo "执行状态: ${{ job.status }}" >> logs/latest_run.log
        
    # 上传日志文件
    - name: 上传执行日志
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: execution-logs-${{ github.run_number }}
        path: logs/
        retention-days: 30
        
    # 提交日志回仓库（可选）
    - name: 提交日志
      if: always()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add logs/
        git diff --quiet && git diff --staged --quiet || git commit -m "更新执行日志 [自动提交]"
        git push
