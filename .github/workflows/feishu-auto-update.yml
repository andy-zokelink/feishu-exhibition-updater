name: 飞书展会自动更新

# 定时触发：每周日早上8点执行（北京时间）
on:
  schedule:
    - cron: '0 0 * * 0'  # UTC时间0点，对应北京时间早上8点
  workflow_dispatch:     # 支持手动触发
  
# 允许手动运行
permissions:
  contents: write

jobs:
  update-exhibition:
    runs-on: ubuntu-latest
    
    steps:
    # 检出代码
    - name: 检出仓库
      uses: actions/checkout@v3
      with:
        persist-credentials: false
        
    # 设置Python环境（不使用缓存，避免报错）
    - name: 设置Python环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    # 安装依赖
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    # 运行现有的更新脚本
    - name: 运行飞书更新脚本
      run: |
        python "飞书展会自动更新脚本_去重增强版.py"
